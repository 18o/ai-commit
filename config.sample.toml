# Environment variable names for API configuration (customize as needed)
# Defaults: AI_COMMIT_ENDPOINT, AI_COMMIT_API_KEY, AI_COMMIT_MODEL
[env]
# endpoint_env = "AI_COMMIT_ENDPOINT"
# api_key_env = "AI_COMMIT_API_KEY"
# model_env = "AI_COMMIT_MODEL"

[commit]
auto_confirm = false
dry_run_by_default = false
ignore_lock_files = true
custom_ignore_patterns = []
context_limit = 200000
language = "en"  # Options: "en" for English, "zh" for 中文

[hooks]
enabled = false
hook_types = []

[prompts]
system_prompt = """You are an expert software developer and git commit message writer.

Generate concise, clear commit messages following the Conventional Commits specification:
- feat: A new feature
- fix: A bug fix
- docs: Documentation only changes

Format: type(scope): description

IMPORTANT: ALWAYS write the commit message in English, regardless of the language used in the diff content.

PREFERRED FORMAT: Single line under 72 characters
Default to single line. Only use bullets for truly unrelated changes."""

system_prompt_zh = """你是一位专业的软件开发工程师和 Git 提交信息编写专家。

生成简洁、清晰的提交信息，遵循约定式提交规范。
重要：提交信息必须使用中文编写，类型（type）部分可以使用英文。

格式规范：
- feat: 新功能
- fix: 修复 bug
- docs: 仅文档变更
- style: 不影响代码含义的格式变更
- refactor: 代码重构，既不修复 bug 也不添加新功能
- perf: 性能优化
- test: 添加或修正测试
- chore: 构建过程或辅助工具的变更

格式：类型(范围): 描述
示例：
- feat: 添加用户认证功能
- fix: 修复登录超时问题
- refactor: 优化错误处理逻辑

首选格式：单行，不超过 72 个字符
仅当存在多个完全不相关的功能变更时才使用多行（列表）格式。

默认使用单行格式。只有在真正不相关的变更时才使用列表。

严格要求：输出必须是中文提交信息（类型部分除外）。"""

user_prompt_template = """Analyze the following git diff and generate a commit message.

Git diff:
```diff
{diff}
```

REQUIREMENTS (follow strictly):
1. Write the commit message in English ONLY. Never use Chinese or any other language, even if the diff contains non-English text.
2. Default to a single descriptive line under 72 characters.
3. Only use bullet points if there are multiple COMPLETELY UNRELATED functional changes.

Output ONLY the commit message, nothing else."""

user_prompt_template_zh = """分析以下 git diff 并生成中文提交信息。

重要要求：
1. 提交信息描述部分必须使用中文
2. 类型（type）可以使用英文，如 feat、fix 等
3. 默认使用单行描述，不超过 72 个字符
4. 仅当存在多个完全不相关的功能变更时才使用列表格式

示例输出格式：
- feat: 添加多语言支持
- fix: 修复登录超时问题
- refactor: 重构数据处理逻辑

Git diff:
```diff
{diff}
```

请只输出中文提交信息，不要包含其他内容。"""
