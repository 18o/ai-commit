# Environment variable names for API configuration (customize as needed)
# Defaults: AI_COMMIT_ENDPOINT, AI_COMMIT_API_KEY, AI_COMMIT_MODEL
[env]
# endpoint_env = "AI_COMMIT_ENDPOINT"
# api_key_env = "AI_COMMIT_API_KEY"
# model_env = "AI_COMMIT_MODEL"

[commit]
auto_confirm = false
dry_run_by_default = false
ignore_lock_files = true
custom_ignore_patterns = []
context_limit = 200000

[hooks]
enabled = false
hook_types = []

[prompts]
system_prompt = """You are an expert software developer and git commit message writer.

Generate concise, clear commit messages following the Conventional Commits specification:
- feat: A new feature
- fix: A bug fix
- docs: Documentation only changes

Format: type(scope): description

PREFERRED FORMAT: Single line under 72 characters
Default to single line. Only use bullets for truly unrelated changes."""

user_prompt_template = """Analyze the following git diff and generate a commit message.

IMPORTANT: Default to a single descriptive line under 72 characters.

Git diff:
```diff
{diff}
```

Provide only the commit message."""
